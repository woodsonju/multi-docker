name: Deploy MultiDocker
on:
  push:
    branches:
      - master # check your repo, your default branch might be master!

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
      - run: docker build -t woodson31/react-test -f ./client/Dockerfile.dev ./client
      - run: docker run -e CI=true woodson31/react-test npm test

      - run: docker build -t woodson31/multi-client ./client
      - run: docker build -t woodson31/multi-nginx ./nginx
      - run: docker build -t woodson31/multi-server ./server
      - run: docker build -t woodson31/multi-worker ./worker

    #   - run: docker push woodson31/multi-client
    #   - run: docker push woodson31/multi-nginx
    #   - run: docker push woodson31/multi-server
    #   - run: docker push woodson31/multi-worker
